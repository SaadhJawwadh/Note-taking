name: note_taking_app
description: "Everything App: A fully local offline-first note-taking, financial manager, and health tracker app with offline AI and SMS auto-import."
publish_to: "none"
version: 2.4.0+20400


environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Local Storage (encrypted)
  sqflite_sqlcipher: ^3.4.0
  flutter_secure_storage: ^9.2.2
  path: ^1.9.0

  # UI & Design
  fl_chart: ^0.69.2
  flutter_staggered_grid_view: ^0.7.0
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_markdown: ^0.7.6
  shared_preferences: ^2.5.2
  share_plus: ^10.1.4
  dynamic_color: ^1.8.1
  file_picker: ^10.1.0
  http: ^1.3.0
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  animations: ^2.0.11
  flutter_staggered_animations: ^1.0.0
  flutter_quill: ^11.0.0
  markdown_quill: ^4.3.0
  flutter_quill_extensions: ^11.0.0
  markdown: ^7.3.0
  math_expressions: ^2.6.0
  font_awesome_flutter: ^10.8.0
  another_telephony: ^0.4.1
  permission_handler: ^11.4.0
  workmanager: ^0.9.0
  flutter_local_notifications: ^19.0.0
  local_auth: ^2.3.0
  table_calendar: ^3.2.0
  timezone: ^0.10.0
  flutter_localizations:
    sdk: flutter
  any_link_preview: ^3.0.2
  receive_sharing_intent: 1.7.0
  speech_to_text: ^7.0.0
  gemini_nano_android: ^1.1.3
  in_app_update: ^4.2.2
  in_app_review: ^2.0.9
  flutter_native_splash: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  sqflite_common_ffi: ^2.4.0+3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#18181b"
  adaptive_icon_foreground: "assets/app_icon.png"
  adaptive_icon_monochrome: "assets/app_icon_monochrome.png"

flutter_native_splash:
  color: "#18181b"
  image: "assets/app_icon.png"
  android_12:
    color: "#18181b"
    image: "assets/app_icon.png"
  web: false

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/app_icon.png
    - assets/app_icon_monochrome.png
  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik-VariableFont_wght.ttf
        - asset: assets/fonts/Rubik-Italic-VariableFont_wght.ttf
          style: italic
    - family: Google Sans Text
      fonts:
        - asset: assets/fonts/GoogleSansText-Regular.ttf
        - asset: assets/fonts/GoogleSansText-Medium.ttf
          weight: 500
        - asset: assets/fonts/GoogleSansText-Bold.ttf
          weight: 700
    - family: Google Sans Code
      fonts:
        - asset: assets/fonts/GoogleSansCode-Variable.ttf
